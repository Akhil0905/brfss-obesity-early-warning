# =============================================================================
# BRFSS Obesity Early Warning — Central Configuration
# =============================================================================
# All tunable parameters live here. The pipeline reads this file at startup.
# Paths are relative to the project root unless marked as absolute.
# =============================================================================

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  raw_filename: "Nutrition__Physical_Activity__and_Obesity_-_Behavioral_Risk_Factor_Surveillance_System.csv"
  interim_filename: "brfss_cleaned.csv"
  features_filename: "features.csv"
  targets_filename: "targets.csv"

  # Subset to this topic only (matches the BRFSS 'Class' field)
  target_class: "Obesity / Weight Status"

  # Specific question we focus on (matches the BRFSS 'Question' field)
  target_question: "Percent of adults aged 18 years and older who have obesity"

  # Columns to retain after loading (further filtered during preprocessing)
  keep_columns:
    - "YearStart"
    - "LocationAbbr"
    - "LocationDesc"
    - "Class"
    - "Topic"
    - "Question"
    - "Data_Value"
    - "Low_Confidence_Limit"
    - "High_Confidence_Limit"
    - "Sample_Size"
    - "Total"
    - "Age(years)"
    - "Education"
    - "Sex"
    - "Income"
    - "Race/Ethnicity"
    - "StratificationCategory1"
    - "Stratification1"
    - "Data_Value_Type"
    - "GeoLocation"

  # Stratification source columns to use for feature encoding
  stratification_columns:
    - "StratificationCategory1"
    - "Stratification1"

  # Minimum non-null Data_Value rows needed per stratum to include it
  min_stratum_rows: 5

# ---------------------------------------------------------------------------
# Feature Engineering
# ---------------------------------------------------------------------------
features:
  # Group key for temporal (lag/rolling) feature construction
  # Must uniquely identify a "panel unit" across years
  group_key:
    - "LocationAbbr"
    - "StratificationCategory1"
    - "Stratification1"

  # Number of lag years to compute
  lag_years: [1, 2]

  # Rolling window for rolling mean prevalence
  rolling_window: 3

  # US Census region mapping — added as a categorical feature
  add_region: true

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
targets:
  # Regression target column
  regression_target: "Data_Value"

  # Percentile (0-100) above which an observation is "high risk"
  # Computed on the TRAINING set only, applied to val/test
  high_risk_percentile: 75

  # Classification target column names
  high_risk_col: "high_risk_obesity"
  early_warning_col: "early_warning"

  # Minimum number of valid next-year pairs to enable the early warning target
  # If below this threshold, pipeline falls back to high_risk_obesity
  early_warning_min_pairs: 500

# ---------------------------------------------------------------------------
# Train / Validation / Test Split
# ---------------------------------------------------------------------------
split:
  # Temporal split boundaries (years are inclusive)
  train_max_year: 2017
  val_min_year: 2018
  val_max_year: 2019
  test_min_year: 2020

  # Random seed for reproducibility across all models
  random_state: 42

# ---------------------------------------------------------------------------
# Regression Models
# ---------------------------------------------------------------------------
regression:
  models:
    - name: "linear_regression"
      enabled: true
    - name: "ridge"
      enabled: true
      alpha: 1.0
    - name: "lasso"
      enabled: true
      alpha: 0.1
    - name: "random_forest"
      enabled: true
      n_estimators: 200
      max_depth: 10
      min_samples_leaf: 4
    - name: "gradient_boosting"
      enabled: true
      n_estimators: 200
      max_depth: 4
      learning_rate: 0.05
    - name: "xgboost"
      enabled: true
      n_estimators: 200
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.8

# ---------------------------------------------------------------------------
# Classification Models
# ---------------------------------------------------------------------------
classification:
  # Which target to use: "high_risk_obesity" or "early_warning"
  # The pipeline will auto-select based on early warning feasibility
  target: "auto"  # auto | high_risk_obesity | early_warning

  models:
    - name: "logistic_regression"
      enabled: true
      C: 1.0
      max_iter: 1000
      class_weight: "balanced"
    - name: "random_forest"
      enabled: true
      n_estimators: 200
      max_depth: 10
      min_samples_leaf: 4
      class_weight: "balanced"
    - name: "gradient_boosting"
      enabled: true
      n_estimators: 200
      max_depth: 4
      learning_rate: 0.05
    - name: "xgboost"
      enabled: true
      n_estimators: 200
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.8
      scale_pos_weight: 1  # override in pipeline if imbalanced

# ---------------------------------------------------------------------------
# Interpretability
# ---------------------------------------------------------------------------
interpretability:
  # Number of top features to show in importance plots
  top_n_features: 20

  # Whether to run SHAP (adds runtime; requires shap package)
  run_shap: false

  # Whether to run permutation importance
  run_permutation_importance: true
  permutation_n_repeats: 10

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  save_models: true
  save_metrics: true
  save_figures: true
  figure_dpi: 150
  figure_format: "png"
